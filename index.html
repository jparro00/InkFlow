<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon: SVG for modern browsers, PNG fallbacks for old Safari/iOS
         which don't reliably render SVG favicons in the tab strip. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <!-- iOS home screen. Both the canonical /apple-touch-icon.png and the
         explicit-size variant point at the same opaque-bg PNG so iOS picks
         it up no matter which path it auto-probes. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>Ink Bloop</title>
    <meta name="theme-color" content="#121212" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      html, body { margin: 0; background: #121212; }
      #boot-splash {
        position: fixed; inset: 0; background: #121212;
        display: flex; align-items: center; justify-content: center;
        z-index: 2147483647;
      }
      #boot-splash svg { animation: boot-pulse 1.4s ease-in-out infinite; }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50%      { opacity: 1;   transform: scale(1.08); }
      }
    </style>
    <script>
      // Apply saved theme before first paint to avoid a palette flash.
      (function () {
        try {
          var t = localStorage.getItem('inkbloop-theme');
          if (t && t !== 'crimson') document.documentElement.dataset.theme = t;
        } catch (e) { /* ignore */ }
      })();
    </script>
    <script>
      (function () {
        var t = '%VITE_CF_ANALYTICS_TOKEN%';
        if (!t || t.charAt(0) === '%') return;
        var s = document.createElement('script');
        s.defer = true;
        s.src = 'https://static.cloudflareinsights.com/beacon.min.js';
        s.setAttribute('data-cf-beacon', '{"token":"' + t + '"}');
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">
        <img src="/logo.svg" width="120" height="120" alt="" aria-hidden="true" />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

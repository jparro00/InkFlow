<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>Ink Bloop</title>
    <meta name="theme-color" content="#0F0E0D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      html, body { margin: 0; background: #110D18; }
      #boot-splash {
        position: fixed; inset: 0; background: #110D18;
        display: flex; align-items: center; justify-content: center;
        z-index: 2147483647;
      }
      #boot-splash svg { animation: boot-pulse 1.4s ease-in-out infinite; }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50%      { opacity: 1;   transform: scale(1.08); }
      }
    </style>
    <script>
      // Apply saved theme before first paint to avoid a palette flash.
      (function () {
        try {
          var t = localStorage.getItem('inkbloop-theme');
          if (t && t !== 'crimson') document.documentElement.dataset.theme = t;
        } catch (e) { /* ignore */ }
      })();
    </script>
    <script>
      (function () {
        var t = '%VITE_CF_ANALYTICS_TOKEN%';
        if (!t || t.charAt(0) === '%') return;
        var s = document.createElement('script');
        s.defer = true;
        s.src = 'https://static.cloudflareinsights.com/beacon.min.js';
        s.setAttribute('data-cf-beacon', '{"token":"' + t + '"}');
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">
        <svg xmlns="http://www.w3.org/2000/svg" width="72" height="69" fill="none" viewBox="0 0 48 46" aria-hidden="true">
          <path fill="#863bff" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
